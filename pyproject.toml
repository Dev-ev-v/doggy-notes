[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "my-notes-cli"
version = "0.1.0"
description = "Simple CLI notes app"
requires-python = ">=3.10"
authors = [{ name = "Guilherme" }]
dependencies = []

[project.scripts]
notes = "my_notes.cli.main:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]