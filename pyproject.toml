[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "doggy-notes"
version = "1.1.0"
description = "Command-line note taking application"
readme = "README.md"
requires-python = ">=3.10"

authors = [
  {name = "Dev-ev-v"}
]

license = {text = "Apache-2.0"}

keywords = ["cli", "notes", "productivity"]

classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "License :: OSI Approved :: Apache Software License",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Topic :: Utilities"
]

dependencies = [
  "typer[all]>=0.12.3,<1.0"
]

[project.urls]
Homepage = "https://github.com/Dev-ev-v/doggy-notes"
Repository = "https://github.com/Dev-ev-v/doggy-notes"
Issues = "https://github.com/Dev-ev-v/doggy-notes/issues"
