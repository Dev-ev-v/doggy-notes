[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "Doggy Notes"
version = "1.0.0-beta.1"
description = "CLI notes app"
requires-python = ">=3.10"
authors = [{ name = "Dev-ev-v" }]
dependencies = []

[project.scripts]
notes = "my_notes.cli.main:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]